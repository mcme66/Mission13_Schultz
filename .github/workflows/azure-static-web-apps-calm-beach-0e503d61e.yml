name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    permissions:
      id-token: write
      contents: read
    steps:
      # Checkout repo
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      # Setup Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install

      # Build the frontend (VITE_API_URL is baked in at build time)
      - name: Build frontend
        env:
          VITE_API_URL: https://mission13schultz.azurewebsites.net
        run: |
          cd frontend
          npm run build

      # Deploy to Azure Static Web App
      - name: Deploy frontend to Azure Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: 'e992667356536b0dbf0df529cf584487a312f748d17c907f5d3725ec5bf9b9df01-dfa734d2-088f-4ae2-959c-f56c49b1189701e17020e503d61e'
          action: "upload"
          app_location: "frontend"
          api_location: "" # optional, leave blank if no Azure Functions
          output_location: "dist"
          skip_app_build: true

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: 'e992667356536b0dbf0df529cf584487a312f748d17c907f5d3725ec5bf9b9df01-dfa734d2-088f-4ae2-959c-f56c49b1189701e17020e503d61e'
          action: "close"
